[database]
; Тип СУБД: sqlite (по умолчанию), postgres, mariadb (или mysql как псевдоним)
db_type = sqlite
url = sqlite+aiosqlite:///./data/licserver.db

; PostgreSQL:
; db_type = postgres
; url = postgresql+asyncpg://user:password@localhost:5432/licserver

; MariaDB / MySQL:
; db_type = mariadb
; url = mysql+aiomysql://user:password@localhost:3306/licserver

echo_sql = false
pool_size = 5
max_overflow = 10
