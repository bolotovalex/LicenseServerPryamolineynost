[brute_force]
max_attempts = 5
lockout_minutes = 15
attempt_window_minutes = 10

[password]
min_length = 8
require_uppercase = true
require_lowercase = true
require_digits = true
require_special = true
special_chars = !@#$%^&*()_+-=[]{}|;:,.<>?

[api_signing]
enabled = true
timestamp_tolerance_seconds = 30
