version: "3.9"

# ─────────────────────────────────────────────────────────────────
#  Конфигурация по умолчанию: SQLite, всё в одном контейнере.
#  Для PostgreSQL / MariaDB — см. README.md (раздел «Запуск через Docker»).
# ─────────────────────────────────────────────────────────────────

services:
  licserver:
    build: .
    container_name: licserver
    restart: unless-stopped
    ports:
      - "8000:8000"

    environment:
      # ── База данных ───────────────────────────────────────────
      # SQLite (по умолчанию, файл внутри смонтированного ./data)
      DATABASE_URL: "sqlite+aiosqlite:///./data/licserver.db"
      DB_TYPE:      "sqlite"

      # PostgreSQL — раскомментируйте и задайте своё подключение:
      # DATABASE_URL: "postgresql+asyncpg://licuser:PASS@db:5432/licserver"
      # DB_TYPE:      "postgres"

      # MariaDB/MySQL — раскомментируйте и задайте своё подключение:
      # DATABASE_URL: "mysql+aiomysql://licuser:PASS@db:3306/licserver"
      # DB_TYPE:      "mariadb"

      # ── Секреты (переопределяют config/app.cfg) ───────────────
      # Рекомендуется задавать здесь или через .env, не в cfg-файлах.
      # SECRET_KEY: "ЗАМЕНИТЕ_НА_СЛУЧАЙНУЮ_СТРОКУ"
      # API_SECRET: "ЗАМЕНИТЕ_НА_ДРУГУЮ_СТРОКУ"

      # ── Cookie ────────────────────────────────────────────────
      # Установите true если приложение работает за HTTPS (production).
      # При false (по умолчанию) cookie работают по HTTP — для локального dev.
      COOKIE_SECURE: "false"

      # ── SMTP (переопределяет config/smtp.cfg) ─────────────────
      # SMTP_USER:     "your@email.com"
      # SMTP_PASSWORD: "your-app-password"

    volumes:
      # Конфигурация — монтируется поверх бейк-ин копии из образа.
      # Изменения в config/ применяются без пересборки контейнера.
      - ./config:/app/config:ro

      # База данных и данные приложения (SQLite-файл, логотипы в BLOB).
      # Для PostgreSQL/MariaDB этот том нужен только для резервных копий.
      - ./data:/app/data

      # Логи приложения и аудита (доступны на хосте).
      - ./logs:/app/logs

      # Шаблоны и статика — правка без пересборки образа.
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro

      # Код приложения — удобно при разработке.
      # Для production закомментируйте, чтобы использовать бейк-ин код из образа.
      - ./app:/app/app:ro
