{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-semibold mb-4">Клиенты</h1>
<form method="post" action="/clients/new" class="bg-white p-4 rounded shadow mb-4 flex gap-3" style="flex-wrap:wrap">
  <input name="org_name" placeholder="Название организации" class="border px-3 py-2 rounded w-1/2" required/>
  <input name="notes" placeholder="Описание / доп. информация" class="border px-3 py-2 rounded w-1/2"/>
  <button class="px-4 py-2 bg-blue-600 text-white rounded">Добавить</button>
</form>

<table class="w-full bg-white rounded shadow">
  <thead><tr class="text-left">
  <th class="p-2">ID</th><th>Организация</th><th>Описание</th><th></th>
</tr></thead>
<tbody>
  {% for c in clients %}
  <tr class="border-t">
    <td class="p-2">{{ c.id }}</td>
    <td>{{ c.org_name }}</td>
    <td>{{ c.notes or '' }}</td>
    <td><a class="text-blue-600" href="/clients/{{ c.id }}">Открыть</a></td>
  </tr>
  {% endfor %}
</tbody>

</table>
{% endblock %}
