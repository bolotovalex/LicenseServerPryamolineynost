<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Новый пароль — License Server</title>
  <link rel="stylesheet" href="/static/styles.css"/>
  <link rel="stylesheet" href="/static/tailwind.min.css"/>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">
<div class="bg-white rounded-xl shadow-md w-full max-w-sm p-8">
  <h1 class="text-xl font-semibold mb-6 text-center">Новый пароль</h1>

  {% if error %}
  <div class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
    {{ error }}
  </div>
  {% endif %}

  {% if errors %}
  <div class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
    <ul class="list-disc list-inside space-y-1">
      {% for e in errors %}<li>{{ e }}</li>{% endfor %}
    </ul>
  </div>
  {% endif %}

  {% if valid_token %}
  <form method="post" class="flex flex-col gap-4">
    <div>
      <label class="block text-sm font-medium mb-1">Новый пароль</label>
      <input name="password" type="password" autocomplete="new-password"
             class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
             required autofocus/>
      <p class="text-xs text-slate-400 mt-1">Мин. 8 символов, заглавные, строчные, цифры, спецсимволы</p>
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Повторите пароль</label>
      <input name="password2" type="password" autocomplete="new-password"
             class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
             required/>
    </div>
    <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg text-sm transition-colors">
      Сохранить пароль
    </button>
  </form>
  {% endif %}

  <div class="mt-4 text-center">
    <a href="/login" class="text-sm text-slate-500 hover:underline">← Вернуться ко входу</a>
  </div>
</div>
</body>
</html>
