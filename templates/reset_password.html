<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Новый пароль — License Server</title>
  <link rel="stylesheet" href="/static/styles.css"/>
  <style>
    body{background:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:36px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
    h1{font-size:20px;font-weight:700;margin:0 0 6px;text-align:center}
    .sub{font-size:13px;color:#64748b;text-align:center;margin-bottom:24px}
    label{display:block;font-size:13px;font-weight:500;margin-bottom:5px}
    .field{margin-bottom:16px}
    .errors{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px}
    .errors ul{margin:0;padding-left:18px}
    .hint{font-size:11px;color:#94a3b8;margin-top:4px}
    .back{display:block;text-align:center;margin-top:16px;font-size:13px;color:#64748b;text-decoration:none}
    .back:hover{color:#1e293b}
  </style>
</head>
<body>
<div class="card">
  <h1>Новый пароль</h1>
  <p class="sub">Введите новый пароль для вашего аккаунта</p>

  {% if errors %}
  <div class="errors">
    <ul>{% for e in errors %}<li>{{ e }}</li>{% endfor %}</ul>
  </div>
  {% endif %}

  {% if valid_token %}
  <form method="post" action="/reset-password">
    <input type="hidden" name="token" value="{{ token }}"/>

    <div class="field">
      <label>Новый пароль *</label>
      <input name="password" type="password" class="input" autocomplete="new-password"
             required autofocus oninput="updateStrength(this.value)"/>
      <div id="pw-bar" style="height:4px;border-radius:2px;margin-top:6px;background:#e2e8f0;transition:width .3s,background .3s;width:0"></div>
      <div id="pw-label" style="font-size:11px;color:#94a3b8;margin-top:3px;height:14px"></div>
      <div class="hint">Мин. 8 символов, заглавные, строчные, цифры, спецсимволы</div>
    </div>

    <div class="field">
      <label>Повторите пароль *</label>
      <input id="confirm-pw" name="password2" type="password" class="input"
             autocomplete="new-password" required oninput="checkMatch()"/>
      <div id="match-hint" style="font-size:11px;margin-top:3px;height:14px"></div>
    </div>

    <button class="btn" style="width:100%">Сохранить пароль</button>
  </form>
  {% endif %}

  <a href="/login" class="back">← Вернуться ко входу</a>
</div>

<script>
var LABELS=['Очень слабый','Слабый','Средний','Хороший','Надёжный'];
var COLORS=['#ef4444','#f59e0b','#f59e0b','#10b981','#10b981'];
function calcScore(pw){
  var s=0;
  if(pw.length>=8) s++;
  if(pw.length>=12) s++;
  if(/[A-Z]/.test(pw)) s++;
  if(/[0-9]/.test(pw)) s++;
  if(/[^A-Za-z0-9]/.test(pw)) s++;
  return s;
}
function updateStrength(pw){
  var bar=document.getElementById('pw-bar'),lbl=document.getElementById('pw-label');
  if(!pw.length){bar.style.width='0';bar.style.background='#e2e8f0';lbl.textContent='';return;}
  var s=calcScore(pw),i=Math.min(s-1,4);
  bar.style.width=(s*20)+'%';bar.style.background=COLORS[Math.max(i,0)];
  lbl.textContent=LABELS[Math.max(i,0)];lbl.style.color=COLORS[Math.max(i,0)];
  checkMatch();
}
function checkMatch(){
  var pw1=document.querySelector('[name=password]').value;
  var pw2=document.getElementById('confirm-pw').value;
  var h=document.getElementById('match-hint');
  if(!pw2){h.textContent='';return;}
  if(pw1===pw2){h.textContent='✓ Пароли совпадают';h.style.color='#10b981';}
  else{h.textContent='✗ Пароли не совпадают';h.style.color='#ef4444';}
}
</script>
</body>
</html>
