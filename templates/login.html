<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Вход — License Server</title>
  <link rel="stylesheet" href="/static/styles.css"/>
  <style>
    body{background:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:36px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
    h1{font-size:20px;font-weight:700;margin:0 0 24px;text-align:center;color:#1e293b}
    label{display:block;font-size:13px;font-weight:500;margin-bottom:5px}
    .field{margin-bottom:16px}
    .alert{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px}
    .alert.error{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b}
    .alert.success{background:#d1fae5;border:1px solid #6ee7b7;color:#065f46}
    .alert.warn{background:#fef3c7;border:1px solid #fcd34d;color:#92400e}
    .links{display:flex;justify-content:space-between;margin-top:16px;font-size:13px}
    .links a{color:#64748b;text-decoration:none}
    .links a:hover{color:#1e293b;text-decoration:underline}
  </style>
</head>
<body>
<div class="card">
  <h1>License Server</h1>

  {% if error %}
  <div class="alert error">{{ error }}</div>
  {% endif %}

  {% if flash_msg %}
  <div class="alert {{ flash_type or 'success' }}">{{ flash_msg }}</div>
  {% endif %}

  <form method="post" action="/login">
    <div class="field">
      <label>Email или логин</label>
      <input name="login" type="text" class="input" autocomplete="username" required autofocus/>
    </div>
    <div class="field">
      <label>Пароль</label>
      <input name="password" type="password" class="input" autocomplete="current-password" required/>
    </div>
    <button class="btn" style="width:100%">Войти</button>
  </form>

  <div class="links">
    <a href="/forgot-password">Забыли пароль?</a>
    <a href="/feedback">Обратная связь</a>
  </div>
</div>
</body>
</html>
