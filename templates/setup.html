<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Первоначальная настройка — License Server</title>
  <link rel="stylesheet" href="/static/styles.css"/>
  <link rel="stylesheet" href="/static/tailwind.min.css"/>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">
<div class="bg-white rounded-xl shadow-md w-full max-w-sm p-8">
  <h1 class="text-xl font-semibold mb-2 text-center">Создание администратора</h1>
  <p class="text-sm text-slate-500 text-center mb-6">Первоначальная настройка системы</p>

  {% if errors %}
  <div class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
    <ul class="list-disc list-inside space-y-1">
      {% for e in errors %}<li>{{ e }}</li>{% endfor %}
    </ul>
  </div>
  {% endif %}

  <form method="post" action="/setup" class="flex flex-col gap-4">
    <div>
      <label class="block text-sm font-medium mb-1">Email</label>
      <input name="email" type="email" autocomplete="email"
             value="{{ email or '' }}"
             class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
             required autofocus/>
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Пароль</label>
      <input name="password" type="password" autocomplete="new-password"
             class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
             required/>
      <p class="text-xs text-slate-400 mt-1">Мин. 8 символов, заглавные, строчные, цифры, спецсимволы</p>
    </div>
    <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg text-sm transition-colors">
      Создать аккаунт
    </button>
  </form>
</div>
</body>
</html>
