<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Первоначальная настройка — License Server</title>
  <link rel="stylesheet" href="/static/styles.css"/>
  <style>
    body{background:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:36px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
    h1{font-size:20px;font-weight:700;margin:0 0 6px;text-align:center;color:#1e293b}
    .sub{font-size:13px;color:#64748b;text-align:center;margin-bottom:24px}
    label{display:block;font-size:13px;font-weight:500;margin-bottom:5px}
    .field{margin-bottom:16px}
    .errors{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px}
    .errors ul{margin:4px 0 0;padding-left:18px}
    .hint{font-size:11px;color:#94a3b8;margin-top:4px}
  </style>
</head>
<body>
<div class="card">
  <h1>Первоначальная настройка</h1>
  <p class="sub">Создание первого администратора системы</p>

  {% if errors %}
  <div class="errors">
    <ul>{% for e in errors %}<li>{{ e }}</li>{% endfor %}</ul>
  </div>
  {% endif %}

  <form method="post" action="/setup">
    <div class="field">
      <label>Email *</label>
      <input name="email" type="email" class="input" autocomplete="email"
             value="{{ email or '' }}" required autofocus/>
    </div>
    <div class="field">
      <label>Пароль *</label>
      <input name="password" type="password" class="input" autocomplete="new-password" required/>
      <div class="hint">Мин. 8 символов, заглавные, строчные, цифры, спецсимволы</div>
    </div>
    <button class="btn" style="width:100%">Создать аккаунт</button>
  </form>
</div>
</body>
</html>
