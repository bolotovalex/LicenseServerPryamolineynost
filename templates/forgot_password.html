<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Восстановление пароля — License Server</title>
  <link rel="stylesheet" href="/static/styles.css"/>
  <style>
    body{background:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:36px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
    h1{font-size:20px;font-weight:700;margin:0 0 6px;text-align:center}
    .sub{font-size:13px;color:#64748b;text-align:center;margin-bottom:24px}
    label{display:block;font-size:13px;font-weight:500;margin-bottom:5px}
    .field{margin-bottom:16px}
    .info-box{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px}
    .back{display:block;text-align:center;margin-top:16px;font-size:13px;color:#64748b;text-decoration:none}
    .back:hover{color:#1e293b}
  </style>
</head>
<body>
<div class="card">
  <h1>Восстановление пароля</h1>
  <p class="sub">Введите email или логин — пришлём ссылку для сброса</p>

  {% if info %}
  <div class="info-box">{{ info }}</div>
  {% else %}
  <form method="post" action="/forgot-password">
    <div class="field">
      <label>Email или логин</label>
      <input name="login" type="text" class="input" autocomplete="username"
             value="{{ login or '' }}" required autofocus/>
    </div>
    <button class="btn" style="width:100%">Отправить ссылку</button>
  </form>
  {% endif %}

  <a href="/login" class="back">← Вернуться ко входу</a>
</div>
</body>
</html>
