<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Восстановление пароля — License Server</title>
  <link rel="stylesheet" href="/static/styles.css"/>
  <link rel="stylesheet" href="/static/tailwind.min.css"/>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">
<div class="bg-white rounded-xl shadow-md w-full max-w-sm p-8">
  <h1 class="text-xl font-semibold mb-2 text-center">Восстановление пароля</h1>
  <p class="text-sm text-slate-500 text-center mb-6">Введите email или логин — пришлём ссылку для сброса</p>

  {% if info %}
  <div class="mb-4 px-4 py-3 rounded-lg bg-blue-50 border border-blue-200 text-blue-700 text-sm">
    {{ info }}
  </div>
  {% endif %}

  {% if not info %}
  <form method="post" action="/forgot-password" class="flex flex-col gap-4">
    <div>
      <label class="block text-sm font-medium mb-1">Email или логин</label>
      <input name="login" type="text" autocomplete="username"
             value="{{ login or '' }}"
             class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
             required autofocus/>
    </div>
    <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg text-sm transition-colors">
      Отправить ссылку
    </button>
  </form>
  {% endif %}

  <div class="mt-4 text-center">
    <a href="/login" class="text-sm text-slate-500 hover:underline">← Вернуться ко входу</a>
  </div>
</div>
</body>
</html>
