<!DOCTYPE html>
<html lang="ru">
<head><meta charset="utf-8"/></head>
<body style="font-family:Arial,sans-serif;color:#1e293b;background:#f8fafc;margin:0;padding:0">
<div style="max-width:560px;margin:32px auto;background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden">
  <div style="background:#475569;padding:24px 28px">
    <div style="color:#fff;font-size:18px;font-weight:700">Новый ответ от организации</div>
    <div style="color:#cbd5e1;font-size:13px;margin-top:4px">License Server</div>
  </div>
  <div style="padding:28px">
    <p style="margin:0 0 8px;color:#64748b;font-size:13px">Организация: <strong>{{ org_name }}</strong></p>
    <p style="margin:0 0 16px;color:#64748b;font-size:13px">Тема: <strong>{{ subject }}</strong></p>
    <div style="background:#f8fafc;border-left:4px solid #64748b;border-radius:0 8px 8px 0;
                padding:14px 16px;font-size:14px;line-height:1.6;white-space:pre-wrap;margin-bottom:16px">{{ reply_text }}</div>
    <a href="{{ admin_url }}" style="display:inline-block;background:#475569;color:#fff;
       text-decoration:none;padding:10px 20px;border-radius:8px;font-size:13px">
      Открыть в панели администратора
    </a>
  </div>
</div>
</body>
</html>
