<!doctype html>
<html lang="ru">
<head><meta charset="utf-8"/></head>
<body style="margin:0;padding:0;background:#f1f5f9;font-family:Arial,sans-serif;color:#1e293b;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f1f5f9;padding:32px 0;">
  <tr><td align="center">
    <table width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;background:#ffffff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);">
      <tr>
        <td style="background:#1f64e2;padding:24px 32px;">
          <span style="color:#ffffff;font-size:20px;font-weight:bold;">License Server</span>
        </td>
      </tr>
      <tr>
        <td style="padding:32px;">
          <h2 style="margin:0 0 16px;font-size:18px;color:#1e293b;">Новое обращение в поддержку</h2>

          <table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;margin-bottom:24px;">
            <tr style="background:#f8fafc;">
              <td style="padding:10px 16px;font-size:13px;color:#64748b;width:40%;border-bottom:1px solid #e2e8f0;">Организация</td>
              <td style="padding:10px 16px;font-size:13px;border-bottom:1px solid #e2e8f0;">{{ org_name }}</td>
            </tr>
            <tr>
              <td style="padding:10px 16px;font-size:13px;color:#64748b;border-bottom:1px solid #e2e8f0;">Email</td>
              <td style="padding:10px 16px;font-size:13px;border-bottom:1px solid #e2e8f0;">{{ contact_email or '—' }}</td>
            </tr>
            <tr style="background:#f8fafc;">
              <td style="padding:10px 16px;font-size:13px;color:#64748b;border-bottom:1px solid #e2e8f0;">Тема</td>
              <td style="padding:10px 16px;font-size:13px;border-bottom:1px solid #e2e8f0;">{{ subject }}</td>
            </tr>
            <tr>
              <td style="padding:10px 16px;font-size:13px;color:#64748b;vertical-align:top;">Сообщение</td>
              <td style="padding:10px 16px;font-size:13px;white-space:pre-wrap;line-height:1.6;">{{ message }}</td>
            </tr>
          </table>

          <p style="margin:0;font-size:13px;color:#64748b;">
            Войдите в <a href="{{ admin_url }}" style="color:#1f64e2;">панель администратора</a>, чтобы ответить на обращение.
          </p>
        </td>
      </tr>
      <tr>
        <td style="background:#f8fafc;padding:16px 32px;border-top:1px solid #e2e8f0;">
          <p style="margin:0;font-size:12px;color:#94a3b8;text-align:center;">
            Это автоматическое письмо — пожалуйста, не отвечайте на него.
          </p>
        </td>
      </tr>
    </table>
  </td></tr>
</table>
</body>
</html>
